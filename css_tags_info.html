<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      p {
        color: red;
        font-size: 20px;
        background-color: lightyellow;
        border: 1px solid #ccc;
        font-family: "Courier New", Courier, monospace;
        font-size: larger;
        font-weight: bold;
        font-style: italic;
        text-decoration: underline;
        text-transform: capitalize;
        letter-spacing: 5px;
        word-spacing: 10px;
        text-align: justify;
        line-height: 1.5;
        background-image: linear-gradient(to bottom, lightyellow, lightblue);
        padding-bottom: 30px;
        background-repeat: no-repeat;
        background-size: contain;
        /* width: 200px; */
        padding: 30px;
      }
      .pp {
        color: blue;
        font-size: 25px;
      }
      #pp1 {
        color: green;
        font-size: 30px;
      }
      /* *{
            margin:0;
            padding:0;
        } */
      h1 {
        width: 100px;
        height: 100px;
        margin: 25px;
        padding: 25px;
        background-color: lightblue;
        border: 1px solid black;
        box-sizing: border-box;
      }
      .one {
        display: block;
      }
      .two {
        display: inline;
      }
      .three {
        display: inline-block;
      }
      .static{
        position:fixed;
        bottom:0;
        right:0;
        color:blue; 
        background-image: linear-gradient(to bottom, lightyellow, lightblue);
        border:1px solid red;
        width:300px;
        height: 200px;
      } 
    </style>
  </head>
  <body>
    <!-- <p>This is simple paragraph</p>
    <p>This is another paragraph</p>
    <p class="pp" id="pp1">This is a third paragraph</p> -->
    <!-- <h1>WOW</h1>
    <p>This is a simple paragraph</p> -->

    <p class="one">Block 1</p>
    <p class="two">block 2</p>
    <p class="three">block 3</p>

    <h2>Using position: static;</h2>

    <p>
      An element with position: static; is always positioned according to the
      normal flow of the page:
    </p>

    <div class="static">This div element has position: static;</div>
    
  </body>
</html>
